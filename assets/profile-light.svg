<svg width="1180" height="610" viewBox="0 0 1180 610" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Max - QA Engineer and Full Stack Developer</title>
  <desc id="desc">Animated light GitHub profile banner with ASCII portrait and terminal style professional summary.</desc>

  <defs>
    <linearGradient id="accent" x1="120" y1="80" x2="1060" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset=".5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#10B981"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 590 305" to="360 590 305" dur="16s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="softLine" x1="0" y1="0" x2="1180" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0"/>
      <stop offset=".5" stop-color="#06B6D4" stop-opacity=".75"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 150) rotate(48) scale(320 230)">
      <stop stop-color="#2563EB" stop-opacity=".18"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 445) rotate(138) scale(360 250)">
      <stop stop-color="#06B6D4" stop-opacity=".18"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="26" y="26" width="1128" height="558" rx="34"/>
    </clipPath>
  </defs>

  <rect x="26" y="26" width="1128" height="558" rx="34" fill="#FFFFFF"/>
  <g clip-path="url(#cardClip)">
    <rect x="26" y="26" width="1128" height="558" fill="#FFFFFF"/>
    <rect x="-70" y="-40" width="520" height="380" fill="url(#glowA)" filter="url(#blur)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 28 18; 0 0" dur="11s" repeatCount="indefinite"/>
    </rect>
    <rect x="720" y="260" width="520" height="360" fill="url(#glowB)" filter="url(#blur)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -32 -18; 0 0" dur="13s" repeatCount="indefinite"/>
    </rect>

    <g opacity=".55">
      <circle cx="104" cy="104" r="2" fill="#06B6D4">
        <animate attributeName="opacity" values=".15;.75;.15" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1018" cy="138" r="2" fill="#10B981">
        <animate attributeName="opacity" values=".2;.7;.2" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="924" cy="520" r="2" fill="#2563EB">
        <animate attributeName="opacity" values=".1;.65;.1" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="330" cy="500" r="1.8" fill="#06B6D4">
        <animate attributeName="opacity" values=".2;.8;.2" dur="5.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <path d="M66 136H1115" stroke="#0F172A" stroke-opacity=".055"/>
    <path d="M66 474H1115" stroke="#0F172A" stroke-opacity=".055"/>
    <rect x="26" y="104" width="1128" height="2" fill="url(#softLine)" opacity=".34">
      <animate attributeName="x" values="-1128;1154" dur="7s" repeatCount="indefinite"/>
    </rect>

    <g transform="translate(76 92)">
      <rect width="385" height="426" rx="24" fill="#F8FAFC" fill-opacity=".88" stroke="#0F172A" stroke-opacity=".08"/>
      <rect x="1" y="1" width="383" height="424" rx="23" stroke="url(#accent)" stroke-opacity=".35"/>
      <text x="28" y="46" fill="#64748B" font-size="14" font-family="SFMono-Regular, Consolas, monospace">ascii.profile</text>
      <circle cx="323" cy="41" r="5" fill="#10B981"/>
      <circle cx="342" cy="41" r="5" fill="#06B6D4"/>
      <circle cx="361" cy="41" r="5" fill="#2563EB"/>
      <g font-family="SFMono-Regular, Consolas, monospace" font-size="19" font-weight="700" fill="url(#accent)" filter="url(#glow)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="6s" repeatCount="indefinite"/>
        <text x="45" y="105" opacity=".92"> __  __   ___   __  __ <animate attributeName="opacity" values=".25;1;1" begin=".2s" dur="7s" repeatCount="indefinite"/></text>
        <text x="45" y="133" opacity=".92">|  \/  | / _ \  \ \/ / <animate attributeName="opacity" values=".25;1;1" begin=".45s" dur="7s" repeatCount="indefinite"/></text>
        <text x="45" y="161" opacity=".92">| |\/| || |_| |  &gt;  &lt;  <animate attributeName="opacity" values=".25;1;1" begin=".7s" dur="7s" repeatCount="indefinite"/></text>
        <text x="45" y="189" opacity=".92">|_|  |_| \___/  /_/\_\ <animate attributeName="opacity" values=".25;1;1" begin=".95s" dur="7s" repeatCount="indefinite"/></text>
        <text x="45" y="235" opacity=".92">  QA SIGNAL: OK <animate attributeName="opacity" values=".25;1;1" begin="1.2s" dur="7s" repeatCount="indefinite"/></text>
        <text x="45" y="263" opacity=".92">  API FLOW: PASS<animate attributeName="opacity" values=".25;1;1" begin="1.45s" dur="7s" repeatCount="indefinite"/></text>
      </g>
      <rect x="36" y="314" width="313" height="1.5" fill="#06B6D4" opacity=".38">
        <animate attributeName="y" values="92;342;92" dur="5.5s" repeatCount="indefinite"/>
      </rect>
      <text x="45" y="365" fill="#64748B" font-size="13" font-family="SFMono-Regular, Consolas, monospace">manual + web + api testing</text>
      <text x="45" y="393" fill="#0F172A" font-size="15" font-family="SFMono-Regular, Consolas, monospace">quality through clarity</text>
    </g>

    <g transform="translate(508 92)">
      <rect width="594" height="426" rx="24" fill="#F8FAFC" fill-opacity=".92" stroke="#0F172A" stroke-opacity=".08"/>
      <rect x="1" y="1" width="592" height="424" rx="23" stroke="url(#accent)" stroke-opacity=".35"/>
      <rect x="0" y="0" width="594" height="62" rx="24" fill="#E2E8F0" fill-opacity=".48"/>
      <circle cx="34" cy="32" r="6" fill="#EF4444"/>
      <circle cx="56" cy="32" r="6" fill="#F59E0B"/>
      <circle cx="78" cy="32" r="6" fill="#10B981"/>
      <text x="108" y="37" fill="#64748B" font-size="14" font-family="SFMono-Regular, Consolas, monospace">~/Akm1xam/profile</text>

      <text x="42" y="118" fill="#0F172A" font-size="40" font-weight="800" font-family="Inter, ui-sans-serif, system-ui">Hi, I'm Max</text>
      <text x="42" y="157" fill="url(#accent)" font-size="24" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">QA Engineer / Full Stack Developer</text>
      <rect x="42" y="176" width="286" height="3" rx="2" fill="url(#accent)">
        <animate attributeName="width" values="80;286;210;286" dur="6s" repeatCount="indefinite"/>
      </rect>

      <g font-family="SFMono-Regular, Consolas, monospace" font-size="16">
        <text x="42" y="230" fill="#64748B">$ focus --current</text>
        <text x="42" y="260" fill="#0F172A" opacity=".92">Testing web apps, APIs and product flows<animate attributeName="opacity" values=".25;1;1" begin=".55s" dur="8s" repeatCount="indefinite"/></text>
        <text x="42" y="293" fill="#64748B">$ stack --practical</text>
        <text x="42" y="323" fill="#0F172A" opacity=".92">Postman · Jira · Git · SQL · DevTools · React<animate attributeName="opacity" values=".25;1;1" begin="1s" dur="8s" repeatCount="indefinite"/></text>
      </g>

      <g font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">
        <rect x="42" y="358" width="84" height="32" rx="16" fill="#06B6D4" fill-opacity=".12" stroke="#06B6D4" stroke-opacity=".42"/>
        <text x="62" y="379" fill="#0369A1">QA</text>
        <rect x="139" y="358" width="112" height="32" rx="16" fill="#2563EB" fill-opacity=".10" stroke="#2563EB" stroke-opacity=".34"/>
        <text x="159" y="379" fill="#1D4ED8">Web/API</text>
        <rect x="264" y="358" width="122" height="32" rx="16" fill="#10B981" fill-opacity=".12" stroke="#10B981" stroke-opacity=".38"/>
        <text x="284" y="379" fill="#047857">Automation</text>
        <rect x="399" y="358" width="104" height="32" rx="16" fill="#F59E0B" fill-opacity=".10" stroke="#F59E0B" stroke-opacity=".32"/>
        <text x="419" y="379" fill="#B45309">Frontend</text>
      </g>
    </g>

    <rect x="26" y="26" width="1128" height="558" rx="34" stroke="#0F172A" stroke-opacity=".08"/>
    <rect x="27" y="27" width="1126" height="556" rx="33" stroke="url(#softLine)" stroke-opacity=".5"/>
  </g>
</svg>
