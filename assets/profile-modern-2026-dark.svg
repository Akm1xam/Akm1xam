<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Maksim - QA Engineer and Web Developer</title>
  <desc id="desc">Modern GitHub profile banner for Maksim, focused on QA engineering, API testing, and web development.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset=".52" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#08131B"/>
    </linearGradient>
    <linearGradient id="accent" x1="126" y1="96" x2="1024" y2="376" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset=".48" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-80 0;80 0;-80 0" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset=".45" stop-color="#A78BFA" stop-opacity=".75"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(166 96) rotate(40) scale(430 260)">
      <stop stop-color="#38BDF8" stop-opacity=".26"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1006 390) rotate(144) scale(450 260)">
      <stop stop-color="#34D399" stop-opacity=".20"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-12%" y="-16%" width="124%" height="132%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <clipPath id="clip">
      <rect x="24" y="24" width="1152" height="452" rx="34"/>
    </clipPath>
  </defs>

  <rect x="24" y="24" width="1152" height="452" rx="34" fill="url(#bg)"/>
  <g clip-path="url(#clip)">
    <rect x="24" y="24" width="1152" height="452" fill="url(#bg)"/>
    <rect x="-120" y="-90" width="600" height="380" fill="url(#glow1)">
      <animateTransform attributeName="transform" type="translate" values="0 0;28 18;0 0" dur="15s" repeatCount="indefinite"/>
    </rect>
    <rect x="730" y="230" width="610" height="360" fill="url(#glow2)">
      <animateTransform attributeName="transform" type="translate" values="0 0;-34 -18;0 0" dur="17s" repeatCount="indefinite"/>
    </rect>
    <g opacity=".13">
      <path d="M96 116H1104" stroke="#E2E8F0"/>
      <path d="M96 382H1104" stroke="#E2E8F0"/>
      <path d="M310 82V418" stroke="#E2E8F0"/>
      <path d="M898 82V418" stroke="#E2E8F0"/>
    </g>
    <rect x="96" y="116" width="1008" height="1.4" fill="url(#shine)" opacity=".48">
      <animate attributeName="x" values="-1008;96;1104" dur="9s" repeatCount="indefinite"/>
    </rect>

    <g transform="translate(92 82)">
      <rect width="182" height="38" rx="19" fill="#111827" fill-opacity=".82" stroke="#253044"/>
      <circle cx="24" cy="19" r="5" fill="#34D399"/>
      <text x="42" y="24" fill="#CBD5E1" font-size="14" font-family="Inter, ui-sans-serif, system-ui">Open to QA roles</text>
    </g>

    <g transform="translate(92 178)">
      <text x="0" y="0" fill="#F8FAFC" font-size="74" font-weight="850" font-family="Inter, ui-sans-serif, system-ui">Maksim</text>
      <text x="3" y="47" fill="url(#accent)" font-size="28" font-weight="760" font-family="Inter, ui-sans-serif, system-ui">QA Engineer / Web Developer</text>
      <text x="3" y="96" fill="#A8B3C7" font-size="18" font-family="Inter, ui-sans-serif, system-ui">I test product flows, APIs, and web interfaces with a developer's eye for detail.</text>
    </g>

    <g transform="translate(92 342)" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="740">
      <rect x="0" y="0" width="116" height="36" rx="18" fill="#0F172A" stroke="#334155"/>
      <text x="24" y="23" fill="#E2E8F0">Manual QA</text>
      <rect x="130" y="0" width="104" height="36" rx="18" fill="#0F172A" stroke="#334155"/>
      <text x="154" y="23" fill="#E2E8F0">API tests</text>
      <rect x="248" y="0" width="120" height="36" rx="18" fill="#0F172A" stroke="#334155"/>
      <text x="271" y="23" fill="#E2E8F0">Regression</text>
      <rect x="382" y="0" width="112" height="36" rx="18" fill="#0F172A" stroke="#334155"/>
      <text x="407" y="23" fill="#E2E8F0">Frontend</text>
    </g>

    <g transform="translate(748 98)" filter="url(#softShadow)">
      <rect width="328" height="304" rx="28" fill="#0E1627" fill-opacity=".80" stroke="#283449"/>
      <text x="30" y="46" fill="#94A3B8" font-size="13" font-family="SFMono-Regular, Consolas, monospace">quality.dashboard</text>
      <text x="30" y="86" fill="#F8FAFC" font-size="24" font-weight="820" font-family="Inter, ui-sans-serif, system-ui">From signal to release</text>
      <g font-family="Inter, ui-sans-serif, system-ui" font-size="15">
        <text x="30" y="137" fill="#CBD5E1">Functional checks</text>
        <rect x="196" y="123" width="92" height="10" rx="5" fill="#1E293B"/>
        <rect x="196" y="123" width="76" height="10" rx="5" fill="url(#accent)"/>
        <text x="30" y="178" fill="#CBD5E1">API validation</text>
        <rect x="196" y="164" width="92" height="10" rx="5" fill="#1E293B"/>
        <rect x="196" y="164" width="68" height="10" rx="5" fill="url(#accent)"/>
        <text x="30" y="219" fill="#CBD5E1">Bug reports</text>
        <rect x="196" y="205" width="92" height="10" rx="5" fill="#1E293B"/>
        <rect x="196" y="205" width="82" height="10" rx="5" fill="url(#accent)"/>
      </g>
      <rect x="30" y="248" width="268" height="1" fill="#263244"/>
      <text x="30" y="278" fill="#94A3B8" font-size="13" font-family="SFMono-Regular, Consolas, monospace">clear reports · stable flows</text>
    </g>
  </g>
  <rect x="24.5" y="24.5" width="1151" height="451" rx="33.5" stroke="#1E293B"/>
  <rect x="25.5" y="25.5" width="1149" height="449" rx="32.5" stroke="url(#shine)" stroke-opacity=".44"/>
</svg>
